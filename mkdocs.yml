  - Inicio: index.md
  - Introducción:
    - Nota al Lector: nota-al-lector.md
    - Prólogo Ejecutivo: prologo.md
    - Ideas Centrales: ideas-centrales.md
  - 'Bloque 1: El Colapso de la Fe Administrativa':
      - 'Capítulo 01: La Muerte de la Confianza Implícita': capitulos/01-Muerte-de-la-Confianza.md
      - 'Capítulo 02: Auditabilidad por Diseño': capitulos/02-Auditabilidad-por-Diseno.md
      - 'Capítulo 03: Las 3 Líneas de Defensa': capitulos/03-Tres-Lineas-de-Defensa.md
  - 'Bloque 2: La Ficción y el Poder':
      - 'Capítulo 04: La Cultura de la Simulación': capitulos/04-Cultura-de-la-Simulacion.md
      - 'Capítulo 05: Identidad como Perímetro': capitulos/05-Identidad-como-Perimetro.md
      - 'Capítulo 06: Privilegios y PAM': capitulos/06-Privilegios-y-PAM.md
  - 'Bloque 3: La Ingeniería del Rastro':
      - 'Capítulo 07: Segregación de Funciones': capitulos/07-Segregacion-de-Funciones.md
      - 'Capítulo 08: Logs, Evidencia Inmutable': capitulos/08-Logs-Evidencia-Inmutable.md
      - 'Capítulo 09: Auditoría de Configuración': capitulos/09-Auditoria-de-Configuracion.md
  - 'Bloque 4: Verificación y Consecuencia':
      - 'Capítulo 10: Auditoría de Comportamiento': capitulos/10-Auditoria-de-Comportamiento.md
      - 'Capítulo 11: Red Teaming y Prueba Hostil': capitulos/11-Red-Teaming-y-Prueba-Hostil.md
      - 'Capítulo 12: Régimen de Sanciones': capitulos/12-Regimen-de-Sanciones.md
  - 'Bloque 5: La Ingeniería de la Certeza':

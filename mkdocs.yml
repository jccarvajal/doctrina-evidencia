      - 'Anexo B: Estándar de Admisibilidad (Checklist)': anexos/B-Estandar-Admisibilidad-Evidencia.md
      - 'Anexo C: Formato de Hallazgo Irrefutable': anexos/C-Formato-Hallazgo-Irrefutable.md
